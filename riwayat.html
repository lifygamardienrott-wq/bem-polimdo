<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
>

<title>Riwayat Aspirasi</title>





<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet"
>





<link
rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
>





<style>

*{

  margin:0;
  padding:0;
  box-sizing:border-box;

}






body{

  background:
  linear-gradient(
    135deg,
    #dbeafe,
    #eff6ff
  );

  font-family:Arial,sans-serif;

  min-height:100vh;

}






/* NAVBAR */

.top-navbar{

  width:100%;

  background:
  linear-gradient(
    135deg,
    #2563eb,
    #3b82f6
  );

  padding:22px 40px;

  display:flex;

  justify-content:space-between;

  align-items:center;

  box-shadow:
  0 10px 25px rgba(0,0,0,0.15);

}






.logo-section{

  display:flex;

  align-items:center;

  gap:18px;

}






.logo-icon{

  width:70px;
  height:70px;

  border-radius:50%;

  background:white;

  display:flex;

  align-items:center;

  justify-content:center;

  font-size:34px;

  color:#2563eb;

}






.logo-title{

  color:white;

  font-size:36px;

  font-weight:bold;

}






.logo-subtitle{

  color:#dbeafe;

  font-size:18px;

}






.nav-buttons{

  display:flex;

  align-items:center;

  gap:15px;

}






.nav-btn{

  background:
  rgba(255,255,255,0.15);

  border:
  1px solid rgba(255,255,255,0.2);

  color:white;

  text-decoration:none;

  padding:15px 25px;

  border-radius:15px;

  font-size:18px;

  font-weight:bold;

  transition:0.3s;

}






.nav-btn:hover{

  transform:translateY(-3px);

  background:
  rgba(255,255,255,0.25);

  color:white;

}






.logout-btn{

  border:none;

  background:white;

  color:#ef4444;

  padding:15px 28px;

  border-radius:15px;

  font-size:18px;

  font-weight:bold;

}






/* CONTENT */

.main-container{

  padding:50px;

}






.page-title{

  font-size:52px;

  font-weight:bold;

  color:#0f172a;

  margin-bottom:40px;

}






.card-riwayat{

  background:white;

  border-radius:30px;

  padding:35px;

  margin-bottom:30px;

  box-shadow:
  0 15px 40px rgba(0,0,0,0.08);

  transition:0.3s;

}






.card-riwayat:hover{

  transform:translateY(-5px);

}






.judul{

  font-size:34px;

  font-weight:bold;

  color:#0f172a;

  margin-bottom:20px;

}






.isi{

  font-size:22px;

  line-height:1.8;

  color:#334155;

  margin-bottom:25px;

}






.info-grid{

  display:grid;

  grid-template-columns:
  repeat(auto-fit,minmax(250px,1fr));

  gap:20px;

  margin-bottom:25px;

}






.info-box{

  background:#f8fafc;

  padding:20px;

  border-radius:18px;

}






.info-label{

  font-size:16px;

  color:#64748b;

  margin-bottom:8px;

}






.info-value{

  font-size:22px;

  font-weight:bold;

  color:#0f172a;

}






.status{

  display:inline-block;

  padding:14px 26px;

  border-radius:40px;

  font-size:20px;

  font-weight:bold;

  color:white;

}






.pending{

  background:#f59e0b;

}






.proses{

  background:#2563eb;

}






.selesai{

  background:#16a34a;

}






.empty-box{

  background:white;

  padding:70px;

  border-radius:30px;

  text-align:center;

  box-shadow:
  0 15px 40px rgba(0,0,0,0.08);

}






.empty-box i{

  font-size:90px;

  color:#94a3b8;

  margin-bottom:20px;

}






.empty-title{

  font-size:36px;

  font-weight:bold;

  color:#0f172a;

  margin-bottom:15px;

}






.empty-text{

  font-size:22px;

  color:#64748b;

}

</style>

</head>

<body>





<!-- NAVBAR -->

<div class="top-navbar">

  <div class="logo-section">

    <div class="logo-icon">

      <i class="bi bi-clock-history"></i>

    </div>





    <div>

      <div class="logo-title">

        Riwayat Aspirasi

      </div>





      <div class="logo-subtitle">

        BEM POLIMDO

      </div>

    </div>

  </div>





  <div class="nav-buttons">

<a href="index.html" class="nav-btn">
  <i class="bi bi-house-fill"></i>
  Dashboard
</a>





    <a
      href="pengaduan.html"
      class="nav-btn"
    >

      <i class="bi bi-pencil-square"></i>

      Buat Aspirasi

    </a>





    <button
      onclick="logout()"
      class="logout-btn"
    >

      <i class="bi bi-box-arrow-right"></i>

      Logout

    </button>

  </div>

</div>





<!-- CONTENT -->

<div class="main-container">

  <div class="page-title">

    Riwayat Aspirasi Saya

  </div>





  <div id="dataRiwayat"></div>

</div>





<script>

const userId =
localStorage.getItem(
  "userId"
);





async function loadData(){

  try{

    const response =
    await fetch(

      `http://localhost:5000/aspirasi/${userId}`

    );





    const data =
    await response.json();





    let html = "";





    if(data.length === 0){

      html = `

      <div class="empty-box">

        <i class="bi bi-inbox"></i>

        <div class="empty-title">

          Belum Ada Aspirasi

        </div>

        <div class="empty-text">

          Kamu belum pernah mengirim aspirasi.

        </div>

      </div>

      `;

    }






    else{

      data.forEach(item=>{

        let statusClass = "";





        if(item.status === "Pending"){

          statusClass = "pending";

        }

        else if(item.status === "Diproses"){

          statusClass = "proses";

        }

        else{

          statusClass = "selesai";

        }






        html += `

        <div class="card-riwayat">

          <div class="judul">

            ${item.judul}

          </div>





          <div class="isi">

            ${item.isi}

          </div>





          <div class="info-grid">

            <div class="info-box">

              <div class="info-label">

                Kategori

              </div>

              <div class="info-value">

                ${item.kategori}

              </div>

            </div>





            <div class="info-box">

              <div class="info-label">

                Prioritas

              </div>

              <div class="info-value">

                ${item.prioritas}

              </div>

            </div>

          </div>





          <div class="status ${statusClass}">

            ${item.status}

          </div>

        </div>

        `;

      });

    }






    document.getElementById(
      "dataRiwayat"
    ).innerHTML = html;

  }

  catch(error){

    console.log(error);

    alert("Gagal mengambil data");

  }

}





loadData();





function logout(){

  localStorage.clear();

  window.location.href =
  "login.html";

}

</script>

</body>
</html>
